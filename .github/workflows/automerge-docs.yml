name: Auto-merge docs PR

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  check-and-merge:
    # Only run on PR comments from the Learn Build bot
    if: |
      github.event.issue.pull_request &&
      github.event.comment.user.login == 'learn-build-service-prod'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Learn Build comments
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/check-learn-build.py

      - name: Merge PR
        if: steps.check.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Auto-merging PR #${{ github.event.issue.number }}..."
          gh pr merge ${{ github.event.issue.number }} --squash \
            --subject "Update API docs from latest CI build" \
            --body "Auto-merged after Learn Build validation passed (PoliCheck clean, no new warnings)."

      - name: Post comment on new warnings
        if: failure() && steps.check.outputs.new_warnings != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.issue.number }} --body \
            "⚠️ **Auto-merge blocked**: ${{ steps.check.outputs.reason }}

          New warnings need manual review before merging. Update \`.github/known-warnings.csv\` if these warnings are expected."

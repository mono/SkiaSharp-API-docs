name: Auto-merge docs PR

on:
  status:

permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  check-and-merge:
    # Only run when a Learn Build status reports on the automation branch
    if: |
      (github.event.context == 'OpenPublishing.Build' ||
       github.event.context == 'PoliCheck Scan') &&
      contains(toJSON(github.event.branches.*.name), 'automation/write-api-docs')
    runs-on: ubuntu-latest

    steps:
      - name: Find PR for commit
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The status event includes the branches this commit belongs to.
          # Find the automation branch and look up the open PR for it.
          branches='${{ toJSON(github.event.branches.*.name) }}'
          branch=$(echo "$branches" | jq -r '.[] | select(. == "automation/write-api-docs")' | head -1)
          if [ -z "$branch" ]; then
            echo "automation/write-api-docs branch not found in status event"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Branch: $branch"

          pr_number=$(gh pr list --repo ${{ github.repository }} \
            --head "$branch" --state open \
            --json number --jq '.[0].number')
          if [ -z "$pr_number" ]; then
            echo "No open PR found for branch $branch"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "PR: #$pr_number"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.pr.outputs.found == 'true'
        uses: actions/checkout@v4

      - name: Check Learn Build statuses
        if: steps.pr.outputs.found == 'true'
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: python3 .github/scripts/check-learn-build.py

      - name: Merge PR
        if: steps.pr.outputs.found == 'true' && steps.check.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Auto-merging PR #${{ steps.pr.outputs.number }}..."
          gh pr merge ${{ steps.pr.outputs.number }} --squash \
            --subject "Update API docs from latest CI build" \
            --body "Auto-merged after Learn Build validation passed (all checks green, no new warnings)."

      - name: Post comment on new warnings
        if: failure() && steps.check.outputs.new_warnings != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ steps.pr.outputs.number }} --body \
            "⚠️ **Auto-merge blocked**: ${{ steps.check.outputs.reason }}

          New warnings need manual review before merging. Update \`.github/known-warnings.csv\` if these warnings are expected."
